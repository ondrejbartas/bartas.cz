      box-sizing: border-box;

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #1a1a1a;
    }

    .card {
      text-align: center;
      padding: 3rem 2rem;
      max-width: 400px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      margin-bottom: 1.5rem;
    }

    h1 {

      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .location {
      color: #666;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      text-decoration: none;
      color: #1a1a1a;
      font-size: 0.95rem;
      padding: 0.5rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      transition: border-color 0.2s, background 0.2s;
    }

    .links a:hover {
      border-color: #999;
      background: #fff;
    }

    .links a svg {
      width: 18px;
      height: 18px;
    }

    .phone {
      color: #666;
      font-size: 0.9rem;
    }

    .phone a {
      color: #1a1a1a;
      text-decoration: none;
    }

    .phone a:hover {
      text-decoration: underline;
    }
